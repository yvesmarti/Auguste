# ================================================================
# CONFIGURATION DECAP CMS — L'Auguste Recycleur
# Compatible GitHub Pages (sans Netlify)
# ================================================================
#
# Prérequis (à faire une seule fois si pas encore fait) :
#  1. Activer GitHub Pages : Settings → Pages → Source : branche main, dossier /
#  2. Vérifier l'OAuth App GitHub (Developer Settings → OAuth Apps) :
#     Homepage URL     : https://yvesmarti.github.io/Auguste
#     Callback URL     : https://yvesmarti.github.io/Auguste/admin/
#  3. Vérifier que le Client ID correspond à : Ov23liBEiiTjC7vOPyXs

backend:
  name: github
  repo: yvesmarti/Auguste
  branch: main
  auth_type: pkce
  app_id: Ov23liBEiiTjC7vOPyXs

media_folder: "images"
public_folder: "images"

# ================================================================
# CE QUI EST ÉDITABLE DEPUIS /admin
# ================================================================

collections:

  # ── Chiffres clés (hero) ─────────────────────────────────────
  - name: "stats"
    label: "Chiffres clés"
    files:
      - name: "stats"
        label: "Statistiques du site"
        file: "content/stats.json"
        format: json
        fields:
          - { label: "Tonnes récupérées",     name: tonnes,        widget: string, hint: "Ex: 156" }
          - { label: "Personnes accompagnées", name: personnes,     widget: string, hint: "Ex: 23" }
          - { label: "Taux de réemploi",       name: taux_reemploi, widget: string, hint: "Ex: 92% (avec le symbole %)" }

  # ── Actualités & Événements ──────────────────────────────────
  - name: "actualites"
    label: "Actualités & Événements"
    folder: "content/actualites"
    format: json
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Date ou statut",    name: date,          widget: string, hint: "Ex: 15 Mars  ou  En cours" }
      - { label: "Couleur du badge",  name: couleur_badge, widget: string, hint: "Ex: bg-[#8B2635]  (rouge) ou bg-[#2C5F2D] (vert) ou bg-[#D4A574] text-[#2C241B] (beige)" }
      - { label: "Titre",             name: titre,         widget: string }
      - { label: "Texte",             name: texte,         widget: text }
      - { label: "Texte du bouton",   name: lien_texte,    widget: string, hint: "Ex: S'inscrire" }
      - { label: "Lien du bouton",    name: lien,          widget: string, default: "#" }

  # ── Vitrine du mois ──────────────────────────────────────────
  - name: "vitrine"
    label: "Vitrine du mois"
    folder: "content/vitrine"
    format: json
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre de l'article", name: titre,         widget: string }
      - { label: "Prix",               name: prix,          widget: string,  hint: "Ex: 45 €" }
      - { label: "Badge (optionnel)",  name: badge,         widget: string,  required: false, hint: "Ex: -40%  ou  NEUF  (laisser vide si aucun)" }
      - { label: "Couleur du badge",   name: couleur_badge, widget: string,  required: false, hint: "Ex: bg-[#8B2635] pour rouge, bg-[#2C5F2D] pour vert" }
      - { label: "Description courte", name: description,   widget: string,  hint: "Ex: Rénové par nos soins" }
      - { label: "Photo",              name: image,         widget: image,   required: false }
      - { label: "Icône de remplacement (si pas de photo)", name: icone, widget: string, required: false, hint: "Ex: armchair, bike, lamp, tv" }
